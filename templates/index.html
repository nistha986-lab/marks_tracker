<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks Tracker</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            min-height:100vh;
            background:linear-gradient(
                135deg,
                #667eea,
                #764ba2,
                #ff6b6b
            );
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        .container{
            width:700px;
            background:white;
            padding:40px;
            border-radius:25px;
            box-shadow:0 15px 40px rgba(0,0,0,0.3);
            text-align:center;
        }

        h1{
            color:#4a148c;
            font-size:42px;
            margin-bottom:10px;
        }

        .subtitle{
            color:#666;
            margin-bottom:30px;
            font-size:18px;
        }

        .input-group{
            margin:15px 0;
        }

        input{
            width:80%;
            padding:14px;
            border:2px solid #ddd;
            border-radius:12px;
            font-size:16px;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border-color:#764ba2;
            box-shadow:0 0 10px rgba(118,75,162,0.4);
        }

        button{
            margin-top:20px;
            padding:15px 35px;
            font-size:18px;
            border:none;
            border-radius:12px;
            background:linear-gradient(
                45deg,
                #ff6b6b,
                #ff9f43
            );
            color:white;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            transform:scale(1.05);
        }

        .graph-section{
            margin-top:30px;
        }

        .graph-section h2{
            color:#2c3e50;
            margin-bottom:15px;
        }

        img{
            width:100%;
            border-radius:15px;
            border:4px solid #764ba2;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .footer{
            margin-top:20px;
            color:#777;
            font-size:14px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>📊 Student Marks Tracker</h1>

    <p class="subtitle">
        Enter your marks from the past 4 years and visualize your progress.
    </p>

    <form method="POST">

        <div class="input-group">
            <input type="number"
                   name="year1"
                   placeholder="Marks for Year 1"
                   required>
        </div>

        <div class="input-group">
            <input type="number"
                   name="year2"
                   placeholder="Marks for Year 2"
                   required>
        </div>

        <div class="input-group">
            <input type="number"
                   name="year3"
                   placeholder="Marks for Year 3"
                   required>
        </div>

        <div class="input-group">
            <input type="number"
                   name="year4"
                   placeholder="Marks for Year 4"
                   required>
        </div>

        <button type="submit">
            Generate Graph 🚀
        </button>

    </form>

    {% if graph %}

    <div class="graph-section">

        <h2>Your Performance Graph</h2>

        <img src="{{ url_for('static',
                             filename='marks_graph.png') }}"
             alt="Marks Graph">

    </div>

    {% endif %}

    <div class="footer">
        Designed with Flask ❤️
    </div>

</div>

</body>
</html>
